
<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dũng - HSSG - Professional AI Work Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['"Roboto"', 'sans-serif'],
            },
            colors: {
              primary: {
                50: 'var(--primary-50)',
                100: 'var(--primary-100)',
                200: 'var(--primary-200)',
                300: 'var(--primary-300)',
                400: 'var(--primary-400)',
                500: 'var(--primary-500)',
                600: 'var(--primary-600)',
                700: 'var(--primary-700)',
                800: 'var(--primary-800)',
                900: 'var(--primary-900)',
              }
            },
            borderRadius: {
              'xl': '1rem',
              '2xl': '1.5rem',
              '3xl': '2.5rem',
            }
          },
        },
      }
    </script>
    <style>
      :root {
        --glass-bg: rgba(255, 255, 255, 0.85);
        --glass-border: rgba(255, 255, 255, 0.4);
        --primary-dark: #154d3c;
        
        /* Green Theme (Default) */
        --primary-50: #f1f8f6;
        --primary-100: #dcece7;
        --primary-200: #bdd9d1;
        --primary-300: #90bab0;
        --primary-400: #649688;
        --primary-500: #43786a;
        --primary-600: #326055;
        --primary-700: #284d44;
        --primary-800: #223f38;
        --primary-900: #154d3c;
      }

      .dark {
        --glass-bg: rgba(15, 23, 42, 0.85);
        --glass-border: rgba(255, 255, 255, 0.1);
        color: #f8fafc;
      }

      body {
        font-family: 'Roboto', sans-serif;
        min-height: 100vh;
        margin: 0;
        transition: background-color 0.3s ease, color 0.3s ease;
      }

      body.light { background-color: #f8fafc; color: #1e293b; }
      body.dark { background-color: #0f172a; color: #f8fafc; }

      /* Background Styles */
      .bg-layer {
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        z-index: -1;
        transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
      }

      .bg-abstract {
        background-image: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1920&auto=format&fit=crop');
        opacity: 0.2;
      }
      .dark .bg-abstract { opacity: 0.15; }

      .bg-mesh {
        background-image: url('https://images.unsplash.com/photo-1620641788421-7a1c342ea42e?q=80&w=1920&auto=format&fit=crop');
        opacity: 0.15;
      }
      .dark .bg-mesh { opacity: 0.1; }

      .bg-minimal {
        background-image: url('https://images.unsplash.com/photo-1614850523296-d8c1af93d400?q=80&w=1920&auto=format&fit=crop');
        opacity: 0.12;
      }
      .dark .bg-minimal { opacity: 0.08; }

      .bg-default {
        background-image: url('https://images.unsplash.com/photo-1635776062127-d379bfcba9f8?q=80&w=1920&auto=format&fit=crop');
        opacity: 0.18;
      }
      .dark .bg-default { opacity: 0.12; }

      .mica {
        background: var(--glass-bg);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid var(--glass-border);
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.03);
      }

      .card-premium {
        background: var(--glass-bg);
        border: 1px solid var(--glass-border);
        box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.05);
        transition: all 0.3s ease;
      }
      
      .card-premium:hover {
        transform: translateY(-3px);
        box-shadow: 0 12px 30px -5px rgba(var(--primary-rgb), 0.15);
        border-color: rgba(var(--primary-rgb), 0.3);
      }

      .dark .card-premium {
        background: rgba(30, 41, 59, 0.7);
      }

      .btn-primary-dark {
        background-color: var(--primary-900);
        color: white;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .btn-primary-dark:hover {
        filter: brightness(1.1);
        transform: translateY(-1px);
        box-shadow: 0 10px 15px -3px rgba(var(--primary-rgb), 0.3);
      }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-fade-in {
        animation: fadeIn 0.5s ease-out forwards;
      }

      /* Scrollbar tinh tế */
      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 10px;
      }
      .dark ::-webkit-scrollbar-thumb { background: #334155; }
      ::-webkit-scrollbar-thumb:hover { background: var(--primary-600); }
    </style>
    <script type="importmap">
    {
      "imports": {
        "react/": "https://esm.sh/react@^19.2.4/",
        "react": "https://esm.sh/react@^19.2.4",
        "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
        "@google/genai": "https://esm.sh/@google/genai@^1.40.0",
        "lucide-react": "https://esm.sh/lucide-react@^0.563.0"
      }
    }
    </script>
  <link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div class="bg-pro-modern"></div>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
